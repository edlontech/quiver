services:
  quic-server:
    build:
      context: .
      dockerfile: Dockerfile.quic-server
    ports:
      - "4433:4433/udp"
    volumes:
      - ../certs:/certs:ro
      - ./logs:/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(socket.AF_INET, socket.SOCK_DGRAM); s.connect(('127.0.0.1', 4433)); s.close()"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    environment:
      - PYTHONUNBUFFERED=1
    command: ["python", "quic_server.py", "--host", "0.0.0.0", "--port", "4433",
              "--cert", "/certs/cert.pem", "--key", "/certs/priv.key",
              "--secrets-log", "/logs/sslkeys.log", "-v"]
    restart: unless-stopped

  # HTTP/3 server for E2E testing (serves files from /www)
  h3-server:
    build:
      context: .
      dockerfile: Dockerfile.quic-server
    ports:
      - "4435:4435/udp"
    volumes:
      - ../certs:/certs:ro
      - ./www:/www:ro
      - ./logs:/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(socket.AF_INET, socket.SOCK_DGRAM); s.connect(('127.0.0.1', 4435)); s.close()"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    environment:
      - PYTHONUNBUFFERED=1
      - H3_SERVER_PORT=4435
    command: ["python", "quic_h3_server.py", "--host", "0.0.0.0", "--port", "4435",
              "--cert", "/certs/cert.pem", "--key", "/certs/priv.key",
              "--document-root", "/www",
              "--secrets-log", "/logs/h3_sslkeys.log", "-v"]
    restart: unless-stopped

  # HTTP/3 server with push support for E2E testing
  h3-push-server:
    build:
      context: .
      dockerfile: Dockerfile.quic-server
    ports:
      - "4436:4436/udp"
    volumes:
      - ../certs:/certs:ro
      - ./www:/www:ro
      - ./logs:/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(socket.AF_INET, socket.SOCK_DGRAM); s.connect(('127.0.0.1', 4436)); s.close()"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    environment:
      - PYTHONUNBUFFERED=1
      - H3_PUSH_ENABLED=1
    command: ["python", "quic_h3_server.py", "--host", "0.0.0.0", "--port", "4436",
              "--cert", "/certs/cert.pem", "--key", "/certs/priv.key",
              "--document-root", "/www", "--enable-push",
              "--secrets-log", "/logs/h3_push_sslkeys.log", "-v"]
    restart: unless-stopped

  # aioquic HTTP/3 client for testing our server
  aioquic-h3-client:
    build:
      context: .
      dockerfile: Dockerfile.quic-server
    volumes:
      - ../certs:/certs:ro
      - ./logs:/logs
    entrypoint: ["python", "http3_client.py"]
    network_mode: host
    profiles:
      - tools

  quic-go-server:
    build:
      context: .
      dockerfile: Dockerfile.quic-go
    ports:
      - "4434:4434/udp"
    volumes:
      - ../certs:/certs:ro
    healthcheck:
      test: ["CMD", "nc", "-u", "-z", "-w1", "localhost", "4434"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
